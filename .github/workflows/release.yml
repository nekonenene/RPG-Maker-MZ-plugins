name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to create release for (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"

          tag_message=$(git tag -l --format='%(contents)' "$tag")
          generated=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$tag" \
            --jq '.body')
          notes=$(printf '%s\n\n%s' "$tag_message" "$generated")

          files=$(find my_plugins -name '*.js' | sort)

          gh release create "$tag" \
            --title "Release $tag" \
            --notes "$notes" \
            $files
